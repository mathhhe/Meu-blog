<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Página sobre os hobbies de Matheus.">
  <title>Hobbies</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
  :root {
    --bg:        #eef6fc;
    --bg-mid:    #ddeef8;
    --accent:    #4a9fd4;
    --accent-soft: #6ab8e8;
    --gold:      #2a6fa8;
    --text:      #1a3a52;
    --text-muted:#6a96b8;
    --nav-bg:    #c8e4f4;
    --border:    #a8d0e8;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background: var(--bg);
    color: var(--text);
    scroll-behavior: smooth;
    padding-bottom: 60px;
  }

  header {
    background: var(--nav-bg);
    padding: 14px 32px;
    position: sticky;
    top: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    gap: 16px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    color: var(--gold);
    margin: 0;
    font-family: 'Noto Serif JP', serif;
    font-size: 1.2rem;
    font-weight: 700;
    white-space: nowrap;
    letter-spacing: 0.04em;
  }
  nav ul {
    display: flex;
    gap: 20px;
    margin: 0;
    padding: 0;
    list-style: none;
  }
  nav a {
    color: var(--text-muted);
    text-decoration: none;
    font-weight: bold;
    font-size: 0.88rem;
    transition: color 0.2s;
  }
  nav a:hover { color: var(--gold); }

  .hero {
    position: relative;
    text-align: center;
    padding: 56px 24px 40px;
    background: linear-gradient(180deg, #b8dcf0 0%, #ddeef8 60%, #eef6fc 100%);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }
  .hero h2 {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.4rem, 5vw, 2rem);
    color: var(--gold);
    margin: 0 0 8px;
    font-weight: 700;
    letter-spacing: 0.06em;
  }
  .hero p {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin: 0 0 28px;
    font-style: italic;
  }
  .gif-wrap img {
    max-width: 100%;
    width: 440px;
    height: auto;
    border-radius: 6px;
    border: 2px solid var(--border);
    box-shadow: 0 8px 32px rgba(74,159,212,0.2);
  }

  section {
    max-width: 700px;
    margin: 0 auto;
    padding: 48px 24px;
  }
  section h2 {
    font-family: 'Noto Serif JP', serif;
    color: var(--accent);
    font-size: clamp(1.1rem, 3.5vw, 1.4rem);
    margin: 0 0 28px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.04em;
  }

  .hobby-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 0;
    list-style: none;
  }
  .hobby-list li {
    font-size: clamp(0.95rem, 2.5vw, 1rem);
    color: var(--text);
    font-weight: 700;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .hobby-list li::before {
    content: '◆';
    color: var(--accent);
    font-size: 0.6rem;
    flex-shrink: 0;
  }
  .hobby-list .sub {
    display: block;
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 400;
    font-style: italic;
    margin-top: 3px;
    padding-left: 18px;
  }

  @media (max-width: 600px) {
    header { flex-direction: column; align-items: flex-start; padding: 12px 16px; }
    .hero { padding: 40px 16px 32px; }
    .gif-wrap img { width: 100%; }
    section { padding: 32px 16px; }
  }
  </style>
</head>
<body>

  <header>
    <h1> Meus Hobbies</h1>
    <nav>
      <ul>
        <li><a href="index.html#home">← Voltar para o início</a></li>
      </ul>
    </nav>
  </header>

  <div class="hero">
    <h2>Bater em newbas!</h2>
    <div class="gif-wrap">
      <img src="https://i.pinimg.com/originals/5c/c9/30/5cc93060e9975a23f85d2c4105e09946.gif" alt="Gif hobby">
    </div>
  </div>

  <section>
    <h2>O que eu faço</h2>
    <ul class="hobby-list">
      <li>
        Challenger no LoL
        <span class="sub">Mains: qualquer bizarrice roubada da jg!</span>
      </li>
      <li>Imortal no Valorant (não dá pra ser perfeito)</li>
      <li>lvl 20 na GC e lvl 10 Faceit</li>
      <li>
        Maior fan de Clannad do mundo!
      </li>
    </ul>
  </section>

</body>
</html>
